<!DOCTYPE html>
<html>
    <head>
        <title>Travel Recommendation Site</title>
        <link rel="stylesheet" href="./travel_recommendation.css">
    </head>
    <body>
        <nav>
            <ul>
                <li><a href="./travel_recommendation.html" id="home">Home</a></li>
                <li><a href="./about_us.html" id="about">About Us</a></li>
                <li><a href="./contact_us.html" id="contact">Contact Us</a></li>
                <li><input type="text" id="recs" placeholder="Enter a destination"> </li>
                <li><button id='btnSearch'>Search</button></li>
                <li><button id='btnReset'>Reset</button></li>
            </ul>
        </nav>
        <div class="hero">
            <div class="contact-layout">
                <div class="herotext">
                    <h1>Contact Us!</h1>
                    <p>Looking forward to hearing from you</p>
                </div>
                <div class="contactform">
                    <form>
                        <div>
                            <label for="name">Name:</label><br>
                            <input type="text" id="name">
                        </div>
                        <div>
                            <label for="email">Email:</label><br>
                            <input type="text" id="email">
                        </div>
                        <div>
                            <label for="message">Message:</label><br>
                            <textarea id="message" rows="6" placeholder="Type your message here..."></textarea>
                        </div>
                        <button id="contactBtn">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
